rules:
  - id: dat-no-console-log
    patterns:
      - pattern: console.log(...)
    message: "Avoid using console.log() in production code. Use a structured logging library like Winston or Pino."
    languages:
      - javascript
      - typescript
    severity: WARNING
    # console.log is the correct, intended channel for DAT's user-facing CLI + report output.
    # Excluding those first-party output files keeps the rule meaningful — it still catches stray
    # debug logging left in scanners, deployers, extractors, etc.
    paths:
      exclude:
        - "src/index.ts"
        - "src/orchestrator.ts"
        - "src/readiness.ts"
        - "src/reporter.ts"
        - "*.test.ts"
        - "testing_data/"

  - id: dat-no-todo-fixme
    patterns:
      - pattern-regex: "(?i)(TODO|FIXME|HACK):.+"
    message: "Unresolved TODO, FIXME, or HACK comment found. Ensure this technical debt is tracked in Jira."
    languages:
      - javascript
      - typescript
    severity: INFO
    paths:
      exclude:
        - "*.test.ts"
        - "testing_data/"

  - id: dat-no-process-exit
    patterns:
      - pattern: process.exit(...)
    message: "Avoid using process.exit() in application code. It abruptly terminates the Node.js process. Throw an error instead."
    languages:
      - javascript
      - typescript
    severity: ERROR
    # process.exit is legitimate in the CLI entrypoint (shell exit codes) and the signal handler;
    # the rule still flags abrupt exits added anywhere else.
    paths:
      exclude:
        - "src/index.ts"
        - "src/orchestrator.ts"
        - "*.test.ts"
        - "testing_data/"
