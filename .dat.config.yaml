scanners:
  semgrep:
    enabled: true
    rules:
      - p/javascript
      - p/security-audit
    customRulesDir: "rules"
  sonarqube:
    enabled: true
  trivy:
    enabled: true
  hadolint:
    enabled: true
  dockle:
    enabled: true
  checkov:
    enabled: true
  osv:
    enabled: true
  zap:
    enabled: true
  jest:
    enabled: true
    threshold: 80
    targetDir: "testing_data/app"
  coverAgent:
    enabled: true
  keploy:
    enabled: true
  k6:
    enabled: true
    thresholdMs: 500
  promptfoo:
    enabled: true
    targetDir: "testing_data/llm_app"
  garak:
    enabled: true
  gitleaks:
    enabled: true
  logicTests:
    enabled: true
    # Treat a missing test suite as a HIGH coverage-gap finding (set false to downgrade to INFO).
    failOnMissingTests: true
    # Optionally override the auto-detected test command, e.g. "npm test" or "pytest -q".
    # command: "npm test"
    targetDir: "testing_data/app"
failOn:
  - CRITICAL
  - HIGH