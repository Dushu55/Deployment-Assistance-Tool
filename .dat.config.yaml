scanners:
  semgrep:
    enabled: true
    rules:
      - p/javascript
      - p/security-audit
    customRulesDir: "rules"
  sonarqube:
    enabled: true
  trivy:
    enabled: true
  hadolint:
    enabled: true
  dockle:
    enabled: true
  checkov:
    enabled: true
  osv:
    enabled: true
  zap:
    enabled: true
  jest:
    enabled: true
    threshold: 80
    targetDir: "testing_data/app"
  coverAgent:
    enabled: true
  keploy:
    enabled: true
  k6:
    enabled: true
    thresholdMs: 500
  promptfoo:
    enabled: true
    targetDir: "testing_data/llm_app"
  garak:
    enabled: true
  gitleaks:
    enabled: true
  logicTests:
    enabled: true
    # Treat a missing test suite as a HIGH coverage-gap finding (set false to downgrade to INFO).
    failOnMissingTests: true
    # Optionally override the auto-detected test command, e.g. "npm test" or "pytest -q".
    # command: "npm test"
    targetDir: "testing_data/app"
failOn:
  - CRITICAL
  - HIGH

# Ephemeral deployment for DAST (OWASP ZAP / k6). When enabled (or when `dat scan --deploy`
# is passed), DAT provisions a short-lived GCP Cloud Run preview, scans it, then tears it
# down. Cost is kept near-zero: scale-to-zero, capped instances, minimal CPU/memory, no
# Cloud SQL, and the service + container image are deleted on teardown.
deployer:
  enabled: false          # set true, or pass --deploy, to provision a preview per scan
  provider: gcp
  gcp:
    projectId: "dat-tool"
    region: us-central1
    # cloudSqlInstance: ""  # leave unset — Cloud SQL is the costly part
    cpu: "1"
    memory: 512Mi
    maxInstances: 1