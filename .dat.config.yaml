# --- Scanner selection ---------------------------------------------------------------
# Simplest option: pick a profile instead of toggling 25 scanners by hand.
#   profile: standard      # quick | standard | security | full
# A profile (or --profile on the CLI) overrides the per-scanner `enabled` flags below.
# Leave it unset to use the explicit per-scanner flags.
#
# autoDetect (default true): skip scanners whose expected input is absent (e.g. Checkov with
# no IaC). Required-tier gaps (Dockerfile / tests / DAST target) are never hidden — they surface
# in the preflight. Disable with `autoDetect: false` or the --no-auto-detect flag.
# autoDetect: true
#
# preflight.required: which input categories block under `dat preflight --strict`.
# Default: [dockerfile, testSuite, dastTarget, datConfig]
# preflight:
#   required: [dockerfile, testSuite, dastTarget, datConfig]
#
# componentEval (default enabled): per-component evaluators run over the component graph
# (buttons, inputs, API calls, endpoints, network) and emit fail-safe/robustness/coherence/
# security findings into the gate + fix-manifest. Security findings block; the rest advise.
# Disable with `componentEval: { enabled: false }` or the --skip-component-eval flag.
# componentEval:
#   enabled: true
#   # LLM reasoning tier (Phase 3 tier 2) — opt-in (off by default for cost). Also enable with
#   # the --llm-eval flag. Findings are advisory (capped at MEDIUM) unless allowBlocking: true.
#   llm:
#     enabled: false
#     maxComponents: 20      # cap components sent to the model per run (cost control)
#     allowBlocking: false   # if true, LLM findings may exceed MEDIUM and block the gate
#     # model: gemini-2.5-flash
#
# llm: choose the Gemini backend (default: auto — API key if GEMINI_API_KEY set, else Vertex on a
# GCP project). The consumer "Google AI Pro" plan cannot be used for API access.
# llm:
#   provider: apikey        # apikey | vertex
#   # project: dat-tool     # Vertex; defaults to deployer.gcp.projectId
#   # location: us-central1
#   # model: gemini-2.5-flash
# -------------------------------------------------------------------------------------
#
# ⚠️ NOTE for real projects: the `targetDir` values below (testing_data/app, testing_data/llm_app)
# point at DAT's OWN test fixtures — they exist so DAT can dogfood-scan itself. When you copy this
# file into your application, OMIT every `targetDir` (and `hadolint.target`): unset, each scanner
# defaults to your workspace root, which is what you want. Only set them to scan a sub-directory.
# -------------------------------------------------------------------------------------

scanners:
  semgrep:
    enabled: true
    rules:
      - p/javascript
      - p/security-audit
    customRulesDir: "rules"
  sonarqube:
    enabled: true
  trivy:
    enabled: true
  hadolint:
    enabled: true
  dockle:
    enabled: true
  checkov:
    enabled: true
  osv:
    enabled: true
  zap:
    enabled: true
    # DAT is a CLI with no web surface to DAST during a self-scan, so a missing target URL is a
    # coverage note (INFO), not a HIGH gate failure. Real apps should leave this true.
    failOnMissingTarget: false
  jest:
    # DAT's own tests use node:test (`npm test` → tsx --test), not Jest. The Jest coverage scanner
    # is N/A here; Logic Tests below runs the real suite.
    enabled: false
  coverAgent:
    enabled: true
  keploy:
    enabled: true
  k6:
    enabled: true
    thresholdMs: 500
    # Like ZAP above: no DAST target during a static self-scan → coverage note (INFO), not HIGH.
    failOnMissingTarget: false
  promptfoo:
    enabled: true
  garak:
    enabled: true
  gitleaks:
    enabled: true
  logicTests:
    enabled: true
    # Treat a missing test suite as a HIGH coverage-gap finding (set false to downgrade to INFO).
    failOnMissingTests: true
    # No targetDir → runs DAT's real `npm test` (230 node:test cases) at the repo root.
failOn:
  - CRITICAL
  - HIGH

# Paths excluded from EVERY scanner + the component walk (dir prefix, or *.ext / **/*.test.ts).
#   - testing_data/  : DELIBERATELY-vulnerable fixtures (planted secrets, bad IaC/Dockerfiles) that
#                      exist to prove DAT detects them — they must not be DAT's own alerts.
#   - scripts/       : local dev/maintenance utilities, not shipped code.
#   - src/components/extractors/ : the extractors' own source contains API-call-shaped sample
#                      patterns the component evaluator would otherwise flag as real endpoints.
exclude:
  - testing_data
  - scripts
  - src/components/extractors

# Resilience controls. maxConcurrency caps parallel scanners; scannerTimeoutMs is a hard
# wall-clock bound per scanner (a hung scanner is reported 'timed out' and the run continues).
# runner:
#   maxConcurrency: 4
#   scannerTimeoutMs: 600000

# Ephemeral deployment for DAST (OWASP ZAP / k6). When enabled (or when `dat scan --deploy`
# is passed), DAT provisions a short-lived GCP Cloud Run preview, scans it, then tears it
# down. Cost is kept near-zero: scale-to-zero, capped instances, minimal CPU/memory, no
# Cloud SQL, and the service + container image are deleted on teardown.
deployer:
  enabled: false          # set true, or pass --deploy, to provision a preview per scan
  provider: gcp
  gcp:
    projectId: "dat-tool"
    region: us-central1
    # cloudSqlInstance: ""  # leave unset — Cloud SQL is the costly part
    cpu: "1"
    memory: 512Mi
    maxInstances: 1