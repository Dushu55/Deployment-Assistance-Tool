name: Deployment Assist Tool (DAT) Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Least-privilege defaults; individual needs granted explicitly below.
permissions:
  contents: read

jobs:
  dat-scans:
    runs-on: ubuntu-latest
    name: Run DevSecOps Scanners
    permissions:
      contents: read
      actions: read            # let upload-sarif read the workflow run (telemetry)
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # OIDC for build-provenance attestation
      attestations: write      # write the provenance attestation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----------------------------------------------------------------------------------
      # GATE — DAT's own quality. These steps fail the build if broken (the required check).
      # ----------------------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build CLI
        run: npm run build

      # ----------------------------------------------------------------------------------
      # BEST-EFFORT — scanner tooling + self-dogfood scan. Never fails the gate:
      #  - third-party tool downloads are flaky; DAT's preflight simply SKIPS a missing tool.
      #  - DAT scans its own repo, which intentionally ships vulnerable fixtures in testing_data/,
      #    so the scan's quality gate is expected to "fail" — we only want its SARIF here.
      # ----------------------------------------------------------------------------------
      - name: Setup Python (for Semgrep/Checkov)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep & Checkov
        continue-on-error: true
        run: python3 -m pip install 'semgrep==1.86.*' 'checkov==3.2.*'

      - name: Install Trivy
        continue-on-error: true
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.49.1

      - name: Install Hadolint
        continue-on-error: true
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint

      - name: Install OSV-Scanner
        continue-on-error: true
        run: |
          curl -sfL https://github.com/google/osv-scanner/releases/download/v1.9.2/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          sudo chmod +x /usr/local/bin/osv-scanner

      - name: Install Dockle
        continue-on-error: true
        run: |
          DOCKLE_VERSION=0.4.14
          curl -L -o dockle.tar.gz "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-64bit.tar.gz"
          tar zxvf dockle.tar.gz
          sudo mv dockle /usr/local/bin
          rm dockle.tar.gz

      - name: Self-scan (dogfood, non-blocking)
        continue-on-error: true
        # Produces results/dat-report.sarif. The '|| true' ensures the deliberately-vulnerable
        # testing_data fixtures don't fail the job (this is a report, not the gate).
        run: node dist/index.js scan --skip-preflight || true
        env:
          FORCE_COLOR: 1

      - name: Upload SARIF report to GitHub Security Tab
        if: ${{ always() && hashFiles('results/dat-report.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results/dat-report.sarif

      # --- Supply-chain provenance of DAT itself (best-effort) ---
      - name: Generate DAT's own SBOM (CycloneDX)
        if: always()
        continue-on-error: true
        run: command -v trivy >/dev/null && trivy fs --format cyclonedx --output dat-sbom.cdx.json . || echo "trivy unavailable; skipping SBOM"

      - name: Upload DAT SBOM artifact
        if: ${{ always() && hashFiles('dat-sbom.cdx.json') != '' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dat-sbom
          path: dat-sbom.cdx.json

      - name: Attest build provenance for the SBOM
        if: ${{ github.event_name == 'push' && hashFiles('dat-sbom.cdx.json') != '' }}
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dat-sbom.cdx.json
